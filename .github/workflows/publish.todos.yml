# Publishes @eyueldk/aisdk-toolkit-todos when the package changes on main.
#
# npm Trusted Publishing (OIDC): configure this workflow filename on npm for the package:
#   https://docs.npmjs.com/trusted-publishers/

name: Publish @eyueldk/aisdk-toolkit-todos

on:
  push:
    branches: [main]
    paths:
      - "packages/todos/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/reusable.publish.yml
    with:
      package: "@eyueldk/aisdk-toolkit-todos"
