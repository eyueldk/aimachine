# Publishes @aimachine/browser when the package changes on main.
#
# npm Trusted Publishing (OIDC): configure this workflow filename on npm for the package:
#   https://docs.npmjs.com/trusted-publishers/

name: Publish @aimachine/browser

on:
  push:
    branches: [main]
    paths:
      - "packages/browser/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/reusable.publish.yml
    with:
      package: "@aimachine/browser"
